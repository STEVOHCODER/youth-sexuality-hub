services:
  # Backend FastAPI Service
  - type: web
    name: youth-hub-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: youth-hub-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: youth-hub-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true

  # Frontend Vite Service
  - type: web
    name: youth-hub-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: youth-hub-backend
          property: url
    routes:
      - type: rewrite
        source: /(.*)
        destination: /index.html

# Managed Databases
databases:
  - name: youth-hub-db
    plan: free

# Managed Redis
redis:
  - name: youth-hub-redis
    plan: free
    ipAllowList: [] # Only allow internal connections
