<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractional Calculus Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 p-8 font-sans min-h-screen flex items-center justify-center">

    <div class="max-w-4xl w-full bg-gray-900 p-8 rounded-2xl shadow-2xl border border-gray-800 relative overflow-hidden">
        <!-- Background Glow effect -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[600px] bg-blue-600/20 rounded-full blur-[120px] pointer-events-none"></div>

        <div class="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">
                    Fractional Derivative Kinematics
                </h2>
                <p class="text-gray-400 mt-1 text-sm font-medium">Visualizing the transition between integer-order derivatives</p>
            </div>
            <button id="downloadBtn" class="flex items-center gap-2 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white px-5 py-2.5 rounded-xl font-semibold transition-all shadow-lg shadow-blue-900/50 active:scale-95">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                Download PNG
            </button>
        </div>

        <div class="relative h-[400px] w-full bg-gray-950/50 rounded-xl p-4 border border-gray-800">
            <canvas id="derivativeChart"></canvas>
        </div>

        <div class="mt-6 grid grid-cols-1 md:grid-cols-3 gap-4 text-sm relative z-10">
            <div class="bg-gray-800/50 p-4 rounded-lg border-l-4 border-gray-500">
                <span class="block text-gray-400 font-semibold mb-1">Zero Derivative (Original)</span>
                <code class="text-gray-200 bg-gray-900 px-2 py-1 rounded">D⁰ x = x</code>
            </div>
            <div class="bg-blue-900/20 p-4 rounded-lg border-l-4 border-blue-400">
                <span class="block text-blue-300 font-semibold mb-1">Half Derivative</span>
                <code class="text-blue-200 bg-blue-950 px-2 py-1 rounded">D½ x = (2/√π) √x</code>
            </div>
            <div class="bg-rose-900/20 p-4 rounded-lg border-l-4 border-rose-400">
                <span class="block text-rose-300 font-semibold mb-1">First Derivative</span>
                <code class="text-rose-200 bg-rose-950 px-2 py-1 rounded">D¹ x = 1</code>
            </div>
        </div>
    </div>

    <script>
        // Data generation for the graph
        const labels = [];
        const dataOriginal = [];
        const dataHalf = [];
        const dataFirst = [];
        
        // Generate values from x=0 to x=5
        for(let x = 0; x <= 5; x += 0.1) {
            labels.push(x.toFixed(1));
            dataOriginal.push(x);
            // Half derivative of x is (2 / sqrt(pi)) * sqrt(x)
            dataHalf.push((2 / Math.sqrt(Math.PI)) * Math.sqrt(x));
            // First derivative of x is 1
            dataFirst.push(1);
        }

        const ctx = document.getElementById('derivativeChart').getContext('2d');
        
        // Chart Configuration
        const derivativeChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { 
                        label: 'f(x) = x', 
                        data: dataOriginal, 
                        borderColor: '#6b7280', 
                        borderDash: [5, 5], 
                        borderWidth: 2,
                        tension: 0.4,
                        pointRadius: 0
                    },
                    { 
                        label: 'D½ x (Half-Derivative)', 
                        data: dataHalf, 
                        borderColor: '#60a5fa', 
                        borderWidth: 3, 
                        tension: 0.4,
                        pointRadius: 0,
                        backgroundColor: 'rgba(96, 165, 250, 0.1)',
                        fill: true
                    },
                    { 
                        label: 'D¹ x = 1', 
                        data: dataFirst, 
                        borderColor: '#fb7185', 
                        borderWidth: 2,
                        tension: 0.4,
                        pointRadius: 0
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                plugins: { 
                    legend: { 
                        labels: { color: '#e5e7eb', font: { family: "'Inter', sans-serif", size: 13 } } 
                    },
                    tooltip: {
                        backgroundColor: 'rgba(17, 24, 39, 0.9)',
                        titleColor: '#93c5fd',
                        bodyColor: '#f3f4f6',
                        borderColor: '#374151',
                        borderWidth: 1
                    }
                },
                scales: {
                    x: { 
                        grid: { color: '#1f2937', drawBorder: false }, 
                        ticks: { color: '#9ca3af' },
                        title: { display: true, text: 'x', color: '#6b7280' }
                    },
                    y: { 
                        grid: { color: '#1f2937', drawBorder: false }, 
                        ticks: { color: '#9ca3af' },
                        title: { display: true, text: 'y', color: '#6b7280' },
                        min: 0,
                        max: 5
                    }
                }
            }
        });

        // Download PNG functionality requirement
        document.getElementById('downloadBtn').addEventListener('click', function() {
            // Create a temporary canvas with white/dark background for saving
            // Since Chart.js by default has a transparent background
            const originalCanvas = document.getElementById('derivativeChart');
            
            // Generate image data URL
            const imageUrl = originalCanvas.toDataURL('image/png', 1.0);
            
            // Create a download link and click it
            const link = document.createElement('a');
            link.download = 'fractional_calculus_chart.png';
            link.href = imageUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
