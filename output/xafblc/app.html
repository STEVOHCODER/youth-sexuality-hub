<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
    </style>
</head>
<body class="bg-gray-50 font-inter overflow-y-auto">
    <div class="w-full h-screen flex justify-center items-center p-8">
        <div class="flex flex-col w-full max-w-md">
            <h1 class="text-4xl font-bold mb-6">Calculator</h1>
            <input type="text" id="display" readonly class="mt-2 px-4 py-2 rounded-lg border shadow-sm focus:outline-none bg-gray-300 text-black placeholder:text-gray-500" />
            <div class="flex mt-8">
                <button class="px-4 py-2 rounded-lg bg-blue-500 text-white font-semibold hover:bg-blue-700 focus:outline-none">C</button>
                <button class="ml-2 px-4 py-2 rounded-lg bg-yellow-500 text-white font-semibold hover:bg-yellow-700 focus:outline-none">AC</button>
            </div>
            <div class="flex mt-8">
                <button class="px-4 py-2 rounded-lg bg-blue-500 text-white font-semibold hover:bg-blue-700 focus:outline-none">7</button>
                <button class="ml-2 px-4 py-2 rounded-lg bg-yellow-500 text-white font-semibold hover:bg-yellow-700 focus:outline-none">8</button>
                <button class="ml-2 px-4 py-2 rounded-lg bg-blue-500 text-white font-semibold hover:bg-blue-700 focus:outline-none">9</button>
                <button class="ml-2 px-4 py-2 rounded-lg bg-red-500 text-white font-semibold hover:bg-red-700 focus:outline-none">+</button>
            </div>
            <div class="flex mt-8">
                <button class="px-4 py-2 rounded-lg bg-blue-500 text-white font-semibold hover:bg-blue-700 focus:outline-none">4</button>
                <button class="ml-2 px-4 py-2 rounded-lg bg-yellow-500 text-white font-semibold hover:bg-yellow-700 focus:outline-none">5</button>
                <button class="ml-2 px-4 py-2 rounded-lg bg-blue-500 text-white font-semibold hover:bg-blue-700 focus:outline-none">6</button>
                <button class="ml-2 px-4 py-2 rounded-lg bg-red-500 text-white font-semibold hover:bg-red-700 focus:outline-none">-</button>
            </div>
            <div class="flex mt-8">
                <button class="px-4 py-2 rounded-lg bg-blue-500 text-white font-semibold hover:bg-blue-700 focus:outline-none">1</button>
                <button class="ml-2 px-4 py-2 rounded-lg bg-yellow-500 text-white font-semibold hover:bg-yellow-700 focus:outline-none">2</button>
                <button class="ml-2 px-4 py-2 rounded-lg bg-blue-500 text-white font-semibold hover:bg-blue-700 focus:outline-none">3</button>
                <button class="ml-2 px-4 py-2 rounded-lg bg-red-500 text-white font-semibold hover:bg-red-700 focus:outline-none">*</button>
            </div>
            <div class="flex mt-8">
                <button class="px-4 py-2 rounded-lg bg-blue-500 text-white font-semibold hover:bg-blue-700 focus:outline-none">0</button>
                <button class="ml-2 px-4 py-2 rounded-lg bg-yellow-500 text-white font-semibold hover:bg-yellow-700 focus:outline-none">.</button>
                <button class="ml-2 px-4 py-2 rounded-lg bg-green-500 text-white font-semibold hover:bg-green-700 focus:outline-none">=</button>
                <button class="ml-2 px-4 py-2 rounded-lg bg-red-500 text-white font-semibold hover:bg-red-700 focus:outline-none">/</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@7.12.15/dist/babel.min.js"></script>

    <script type="text/babel">
        class Calculator extends React.Component {
            constructor(props) {
                super(props);
                this.state = {
                    displayValue: '',
                };

                this.handleButtonClick = this.handleButtonClick.bind(this);
            }

            handleButtonClick(event) {
                const { value } = event.target;
                if (value === 'C') {
                    this.setState({ displayValue: '' });
                } else if (value === '=') {
                    try {
                        const result = eval(this.state.displayValue);
                        this.setState({ displayValue: result.toString() });
                        localStorage.setItem('calculation', result.toString());
                    } catch (error) {
                        alert(`Error: ${error}`);
                    }
                } else if (value === 'AC') {
                    localStorage.removeItem('calculation');
                    this.setState({ displayValue: '' });
                } else if (['+', '-', '*', '/'].includes(value)) {
                    this.handleOperator(value);
                } else {
                    this.handleNumber(value);
                }
            }

            handleNumber(value) {
                const currentValue = this.state.displayValue;
                this.setState({ displayValue: currentValue + value });
                localStorage.setItem('calculation', currentValue + value);
            }

            handleOperator(operator) {
                const currentValue = this.state.displayValue;
                if (currentValue === '') return;
                const calculation = `${currentValue} ${operator}`;
                this.setState({
                    displayValue: calculation,
                    lastCalculation: calculation,
                });
                localStorage.setItem('calculation', calculation);
            }

            render() {
                return (
                    <div className="mt-8">
                        <input type="text" id="display" value={this.state.displayValue} readonly />
                        <div className="flex mt-8">
                            <button onClick={this.handleButtonClick.bind(this, 'C')}>C</button>
                            <button onClick={this.handleButtonClick.bind(this, 'AC')}>AC</button>
                        </div>
                        {/* Add more buttons for digits and operators */}
                    </div>
                );
            }
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<Calculator />);
    </script>
</body>
</html>
