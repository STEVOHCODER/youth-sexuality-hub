<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern To-Do List</title>
    <link rel="stylesheet" href="https://cdn.tailwindcss.com">
</head>
<body class="dark:bg-gray-900 dark:text-white">
    <!-- Navigation Bar -->
    <nav class="bg-white px-4 py-2 shadow-md sticky top-0 z-10">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-800">To-Do List</h1>
            <button class="px-4 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-300 focus:ring-offset-2">Add Task</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto p-4">
        <h2 class="text-lg font-bold mb-4">Tasks</h2>
        <ul class="list-disc space-y-2">
            <!-- Tasks will be dynamically added here using JavaScript -->
        </ul>

        <!-- Add Task Form -->
        <form id="taskForm" class="space-y-2">
            <input type="text" name="task" placeholder="Enter a new task" required class="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-300 focus:ring-offset-2">
            <button type="submit" class="px-4 py-2 bg-green-500 text-white rounded-md hover:bg-green-600 focus:outline-none focus:ring-2 focus:ring-blue-300 focus:ring-offset-2">Add Task</button>
        </form>
    </div>

    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/js/bootstrap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
