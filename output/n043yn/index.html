<!-- filename: index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Premium Essentials</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container navbar">
            <div class="logo">Aura.</div>
            <button id="cart-btn" class="cart-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
                Cart <span id="cart-count">0</span>
            </button>
        </div>
    </header>

    <section class="hero">
        <div class="container hero-content">
            <h1>Elevate Your Everyday</h1>
            <p>Discover our curated collection of premium, highly-functional essentials designed to improve your life.</p>
            <a href="#product-grid" class="btn-primary hero-btn">Shop Now</a>
        </div>
    </section>

    <main class="container">
        <h2 class="section-title">Featured Products</h2>
        <div id="product-grid" class="grid">
            <div class="loader">Loading products...</div>
        </div>
    </main>

    <!-- Cart Sidebar -->
    <div id="cart-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>Your Cart</h2>
            <button id="close-cart" class="close-btn">&times;</button>
        </div>
        <div id="cart-items" class="cart-items">
            <!-- Items injected by JS -->
        </div>
        <div class="cart-footer">
            <div class="total">Total: $<span id="cart-total">0.00</span></div>
            <button id="checkout-btn" class="btn-primary checkout-btn">Proceed to Checkout</button>
        </div>
    </div>
    <div id="sidebar-overlay" class="overlay"></div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Notification message</div>

    <footer>
        <div class="container">
            <p>&copy; 2024 Aura Store. All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
